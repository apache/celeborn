name: Lint Check for Web

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:
    branches:
      - main
      - branch-*

concurrency:
  group: style-web-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
      with:
        version: 8

    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    # When updating node and pnpm version, also need to update the version in `web/pom.xml`
    - name: Use Node.js v20.11.0
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 20.11.0

    - name: Use pnpm v8.14.3
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
      with:
        version: 8.14.3

    - name: Install dependencies
      run: pnpm install
      working-directory: ./web

    - name: Lint and format
      run: pnpm run lint
      working-directory: ./web
