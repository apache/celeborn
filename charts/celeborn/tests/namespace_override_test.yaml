suite: Test namespace override

templates:
  - configmap.yaml
  - master/statefulset.yaml
  - worker/statefulset.yaml

release:
  name: celeborn
  namespace: default

tests:
  - it: Should use namespace override for config and readiness DNS
    set:
      namespaceOverride: celeborn
    asserts:
      - equal:
          path: metadata.namespace
          value: celeborn
        template: configmap.yaml
      - matchRegex:
          path: data["celeborn-defaults.conf"]
          pattern: celeborn-master-0\.celeborn-master-svc\.celeborn\.svc\.cluster\.local
        template: configmap.yaml
      - matchRegex:
          path: spec.template.spec.containers[0].command[4]
          pattern: celeborn-master-0\.celeborn-master-svc\.celeborn\.svc\.cluster\.local
        template: master/statefulset.yaml
      - matchRegex:
          path: spec.template.spec.containers[0].command[4]
          pattern: celeborn-master-0\.celeborn-master-svc\.celeborn\.svc\.cluster\.local
        template: worker/statefulset.yaml
