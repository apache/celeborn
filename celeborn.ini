celeborn.client.fetch.excludeWorkerOnFailure.enabled=true
celeborn.client.push.excludeWorkerOnFailure.enabled=true
celeborn.client.push.replicate.enabled=true
celeborn.client.excludePeerWorkerOnFailure.enabled=true
celeborn.worker.excluded.expireTimeout=1800s
celeborn.client.shuffle.register.filterExcludedWorker.enabled=true
celeborn.push.data.timeout=150s
celeborn.client.push.timeout=150s
celeborn.client.excludedWorker.expireTimeout=300s
celeborn.client.spark.fetch.throwsFetchFailure=true

;Amount of total Netty in-flight requests.
celeborn.client.push.maxReqsInFlight.total=512

celeborn.worker.graceful.shutdown.enabled=true
celeborn.worker.graceful.shutdown.recoverPath=\\data\\yarnnm\\celeborn\\recover
celeborn.worker.rpc.port=9970
celeborn.worker.fetch.port=9971
celeborn.worker.push.port=9972
celeborn.worker.replicate.port=9973

; Tune retry configs for rolling upgrade with ~20 min worker downtime
; Total tolerance = fetchRetries × (connectTimeout + io.maxRetries × io.retryWait)
;                 = 13 × (20s + 5 × 15s) = 13 × 95s = 1235s ≈ 20.6 min
celeborn.fetch.maxRetriesForEachReplica=13
celeborn.data.io.connectTimeout=20s
celeborn.data.io.maxRetries=5
celeborn.data.io.retryWait=15s
celeborn.data.io.connectionTimeout=300s

celeborn.client.slot.assign.maxWorkers=1500

; used by master to bootstrap
celeborn.master.host=%COMPUTERNAME%
celeborn.master.port=29097

; used by master nodes to bootstrap, every node should know the topology of whole cluster, for each node,
; `celeborn.master.ha.node.id` should be unique, and `celeborn.master.ha.node.<id>.host` is required.
celeborn.master.ha.enabled=true

celeborn.master.heartbeat.application.timeout=600s

; Int bed
MTControlEnv:MTPrime-Int-CHIE01$celeborn.master.ap-machinefunction=YarnRouter0
MTControlEnv:MTPrime-Test-MWHE01$celeborn.master.ap-machinefunction=YarnRM0
MTControlEnv:MTPrime-Dev-CHIE01$celeborn.master.ap-machinefunction=YarnRM0

