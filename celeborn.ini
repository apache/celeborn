[celeborn-site]
celeborn.master.http.port=29098

celeborn.master.ha.ratis.raft.server.storage.dir=D:\\data\\yarnnm\\celeborn\\celeborn_ratis\\
celeborn.metrics.enabled=true
celeborn.worker.flusher.buffer.size=1m

; we will firstly use D:\data\yarnnm\celeborn which is always mounted to SSD K driver
celeborn.worker.storage.dirs=\\data\\yarnnm\\celeborn\\celeborn:capacity=30g:disktype=SSD,\\data\\yarnnm\\celeborn\\celeborn1:capacity=30g:disktype=SSD,\\data\\yarnnm\\celeborn\\celeborn2:capacity=30g:disktype=SSD,\\data\\yarnnm\\celeborn\\celeborn3:capacity=30g:disktype=SSD,\\data\\yarnnm\\celeborn\\celeborn4:capacity=30g:disktype=SSD,\\data\\yarnnm\\celeborn\\celeborn5:capacity=30g:disktype=SSD

; celeborn.storage.activeTypes=SSD
celeborn.storage.activeTypes=SSD
celeborn.worker.sortPartition.threads=64
;celeborn.worker.commitFiles.timeout=240s
;celeborn.worker.commitFiles.threads=128
celeborn.master.slot.assign.policy=roundrobin
;celeborn.rpc.askTimeout=240s
celeborn.worker.flusher.hdfs.buffer.size=4m
; Used when celeborn.storage.activeTypes contains HDFS
; celeborn.storage.hdfs.dir=hdfs://MTPrime-MWHE02-0/user/jutia/celebornDataDir/celeborn
;celeborn.worker.replicate.fastFail.duration=240

; If your hosts have disk raid or use lvm, set `celeborn.worker.monitor.disk.enabled` to false
celeborn.worker.monitor.disk.enabled=true

celeborn.client.fetch.excludeWorkerOnFailure.enabled=true
celeborn.client.push.excludeWorkerOnFailure.enabled=true
celeborn.client.push.replicate.enabled=true
celeborn.client.excludePeerWorkerOnFailure.enabled=true
celeborn.worker.excluded.expireTimeout=1800s
celeborn.client.shuffle.register.filterExcludedWorker.enabled=true
celeborn.push.data.timeout=60s
celeborn.client.push.timeout=60s
celeborn.client.excludedWorker.expireTimeout=360s

celeborn.worker.graceful.shutdown.enabled=true
celeborn.worker.graceful.shutdown.recoverPath=\\data\\yarnnm\\celeborn\\recover
celeborn.worker.rpc.port=9970
celeborn.worker.fetch.port=9971
celeborn.worker.push.port=9972
celeborn.worker.replicate.port=9973

celeborn.fetch.maxRetriesForEachReplica=2
celeborn.data.io.connectTimeout=5s
celeborn.data.io.maxRetries=2
celeborn.data.io.connectionTimeout=120s

celeborn.client.slot.assign.maxWorkers=1500

; used by master to bootstrap
celeborn.master.host=%COMPUTERNAME%
celeborn.master.port=29097

; used by master nodes to bootstrap, every node should know the topology of whole cluster, for each node,
; `celeborn.master.ha.node.id` should be unique, and `celeborn.master.ha.node.<id>.host` is required.
celeborn.master.ha.enabled=true

; celeborn.master.ha.node.{id}.host and celeborn.master.endpoint and celeborn.master.ha.node.{id}.port and celeborn.master.ha.node.{id}.ratis.port
; is autumatically generated based on celeborn.master.ap-environment and celeborn.master.ap-machinefunction
celeborn.master.ap-environment=MTPrimeCeleborn-Prod-CHIE01.CHIE01
celeborn.master.ap-machinefunction=CelebornMaster